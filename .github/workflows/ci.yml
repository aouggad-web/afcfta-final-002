name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser aiohttp pandas numpy

      - name: Run backend tests
        run: |
          python -m pytest tests/test_health_endpoint.py tests/test_north_africa_uma.py -v --tb=short

      - name: Run backend unit tests
        run: |
          python -m pytest backend/tests/ -v --tb=short --ignore=backend/tests/test_notifications.py
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_BACKEND_URL: http://localhost:8000
